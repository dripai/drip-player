name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
          - name: macOS Apple Silicon
            runner: macos-26
          - name: macOS Intel
            runner: macos-26-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore bundled media tools
        uses: actions/cache@v4
        with:
          path: |
            .tool-cache
            lib
          key: media-tools-${{ runner.os }}-${{ runner.arch }}-${{ matrix.name }}-${{ hashFiles('scripts/download-tools.mjs') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Drip Player ${{ github.ref_name }}"
          releaseBody: |
            Automated release for Drip Player ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
